# Goal - I have to Lint, Build , Test the code for Frontend and backend
# then push the images to DockerHub

name: CI
on:
    push:
        branches: [advanced]
jobs: 
    frontend:
        # Github runner
        runs-on: ubuntu-latest
        steps: 
           - name: Checkout Code
             uses: actions/checkout@v4
           
           # Lint
           - name: Setup NodeJs
             uses: actions/setup-node@v4
             with: 
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend\package-lock.json

           - name: Install npm Packages
             run: npm install
             working-directory: frontend

           - name: Run Linter
             run: npm run lint
             working-directory: frontend

           - name: Run Tests
             run: npm run test
             working-directory: frontend

           # Push

    # backend: 
      # steps:
         #- Lint
         #- Build
         #- Test
         #- Push
