# Goal - I have to Lint, Build , Test the code for Frontend and backend
# then push the images to DockerHub

name: CI
on:
    push:
        branches: [master]
jobs: 
    frontend:
        # Github runner
        runs-on: ubuntu-latest
        steps: 
           - name: Checkout Code
             uses: actions/checkout@v4
           
           # Lint
           - name: Setup NodeJs
             uses: actions/setup-node@v4
             with: 
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend\package-lock.json

           - name: Install npm Packages
             run: npm install
             working-directory: frontend

           - name: Run Linter
             run: npm run lint
             working-directory: frontend

           - name: Run Tests
             run: npm run test
             working-directory: frontend

           # Push
           - name: Docker Setup [Login]
             uses: docker/login-action@v4
             with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

           - name: Docker Build and Push
             uses: docker/build-push-action@v7
             with:
                context: ./frontend
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest
                
      # backend: 

      # Github runner
        runs-on: ubuntu-latest
        steps: 
           - name: Checkout Code
             uses: actions/checkout@v4
           
           # Lint
           - name: Setup NodeJs
             uses: actions/setup-go@v4
             with: 
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: go.sum

           - name: Run Go Formatter
             run: go fmt
             working-directory: backend

           - name: Run Go Vet
             run: go Vet
             working-directory: backend

           - name: Run Tests
             run: go test
             working-directory: backend

           # Push
           - name: Docker Setup [Login]
             uses: docker/login-action@v4
             with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

           - name: Docker Build and Push
             uses: docker/build-push-action@v7
             with:
                context: ./backend
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest

deploy: 
    needs: [frontend,backend]
    uses: ./.github/workflows/cd.yml
    secret: inherit

