# Goal -  To run the end to end DevSecOps pipeline

name: DevSecOps

on:
  push:
      branches: [master]
jobs:
  # Code Stage (with shift left) 
  code-quality:
      uses: ./.github/workflows/code-quality.yml

  # Secret Scanning
  secret-scanning:
       uses: ./.github/workflows/secret-scanning.yml

  # Dependency Checks
  dependency-Checks:
        uses: ./.github/workflows/dependency-scan.yml

  # Docker Checks
  docker-Checks:
        uses: ./.github/workflows/docker-scans.yml     
        secrets: inherit