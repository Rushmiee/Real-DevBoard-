#Goal - I have to do SAST for my code for code quality

name: Code quality

# you can call this workflow before/after any other workflow
on: 
  workflow_call:   

jobs:
    SAST:
        runs-on: Ubuntu-latest
        steps:
           - name: Code Checkout
             uses: actions/checkout@v7

           # Lint - frontend
           - name: Setup NodeJs
             uses: actions/setup-node@v4
             with: 
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend\package-lock.json

           - name: Install npm Packages
             run: npm install
             working-directory: frontend

           - name: Run Linter
             run: npm run lint
             working-directory: frontend
          
           # Lint - backend
           - name: Setup Go
             uses: actions/setup-go@v4
             with: 
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: go.sum

           - name: Run Go Formatter
             run: go fmt
             working-directory: backend

           - name: Run Go Vet
             run: go Vet
             working-directory: backend