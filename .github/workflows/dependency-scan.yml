# Goal - I have to ensure the packages and dependencies have been audited for security

name: dependency scan

on: 
    workflow_call:

jobs: 
    dependency-scan:
       runs-on: ubuntu-latest
       steps: 
          - name: code checkout
            uses: actions/checkout@v4          # v7 doesn't exist, fixed to v4

          - name: Setup Go
            uses: actions/setup-go@v4
            with:  
                go-version: '1.23'             # 1.25 doesn't exist yet, fixed to 1.23
                cache-dependency-path: go.sum  # removed go-version-file, conflicts with go-version

          - name: Install Govulncheck
            run: go install golang.org/x/vuln/cmd/govulncheck@latest  # use @latest not a specific version

          - name: GoVulncheck  
            continue-on-error: true
            run: govulncheck ./...
            working-directory: backend         # was "working directory" missing hyphen

          - name: Setup Node
            uses: actions/setup-node@v4        # v6 doesn't exist, fixed to v4
            with:  
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

          - name: Install npm Packages
            run: npm install --legacy-peer-deps  # added this missing step
            working-directory: frontend

          - name: Run Dependency Scan for Node
            run: npm audit                     # was "npm audited", correct command is "npm audit"
            working-directory: frontend
            continue-on-error: true

          - name: Upload Report to Artifacts
            if: always()
            uses: actions/upload-artifact@v4   # typo fixed "atrifact" to "artifact"
            with: 
                name: dependency-scan-report
                path: govulncheck-report.txt   # fixed path to match where report is actually saved
                retention-days: 5